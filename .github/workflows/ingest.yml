name: ingest-data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */3 * * *"   # every 3 hours at :20 UTC (edit if you want)

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run ingestion
        run: python pipelines/ingest.py

      - name: Commit updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ docs/data/latest.json
            git commit -m "data: ingest $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No changes."
          fi